name: test

on:
  pull_request:
  push:
    branches: [ main ]

permissions:
  contents: read

jobs:
  test-unix:
    name: test on ${{ matrix.os }} with ${{ matrix.cxx }}

    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cxx: g++
          - os: ubuntu-latest
            cxx: clang++
          - os: macos-latest
            cxx: clang++
      # Do not auto-cancel other runners if one fails
      fail-fast: false

    env:
      CXX: ${{ matrix.cxx }}

    steps:
      - name: Disable man-db building
        if: ${{ matrix.os == 'ubuntu-latest' }}
        # This speeds up apt-get, by preventing the man-db step from running
        run: sudo rm -vf /var/lib/man-db/auto-update

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      # Use mold for faster linking
      - uses: rui314/setup-mold@45c2b085bbc0283c8e1443d4a511aaa1eda5a3a1 # v1
        if: ${{ matrix.os == 'ubuntu-latest' }}
        with:
          mold-version: 2.38.0
          make-default: true

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-${{ matrix.os }}-${{ matrix.cxx }}
          create-symlink: true
          # Disable cache cleanups while building
          max-size: "0"

      - name: dependencies (OS specific)
        run: bash scripts/setup-${{ matrix.os }}.sh

      - name: build and test
        run: bash scripts/build-common.sh DEBUG=true SANITIZE=true

      - name: CCache cleanup
        # Manual ccache cleanup, using the ccache-action default max size
        run: env CCACHE_MAXSIZE=500M ccache --cleanup

  test-windows:
    name: test on windows

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c # v2.31.1
        with:
          msystem: ucrt64
          install: |
            make
            mingw-w64-ucrt-x86_64-ccache
            mingw-w64-ucrt-x86_64-cmake
            mingw-w64-ucrt-x86_64-gcc
            mingw-w64-ucrt-x86_64-git
            mingw-w64-ucrt-x86_64-isa-l
            mingw-w64-ucrt-x86_64-meson
            mingw-w64-ucrt-x86_64-mimalloc
            mingw-w64-ucrt-x86_64-python
            mingw-w64-ucrt-x86_64-python-fastjsonschema
            mingw-w64-ucrt-x86_64-python-sphinx

      - name: ccache
        uses: hendrikmuhs/ccache-action@d62db5f07c26379fc4b4e0916f098a92573c3b03 # v1.2.23
        with:
          key: ${{ github.job }}-windows
          # Disable cache cleanups while building
          max-size: "0"

      - name: dependencies (OS specific)
        shell: msys2 {0}
        run: bash scripts/setup-windows-latest.sh

      - name: build and test
        shell: msys2 {0}
        run: bash scripts/build-common.sh DEBUG=true

      - name: CCache cleanup
        # Manual ccache cleanup, using the ccache-action default max size
        run: env CCACHE_MAXSIZE=500M ccache --cleanup
